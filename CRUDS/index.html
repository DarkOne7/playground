<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" >
    <title>CRUDS</title>
</head>
<body>
    <div class="crud">
        <div class="head">
            <h2>products management system</h2>
            <p>working with cruds</p>
        </div>
        <div class="inputs">
            <input type="text" placeholder="product name" id="name">
            <div class="price">
                <input type="number" placeholder="product price" id="price">
                <input type="number" id="fees" placeholder="product fees">
                <input type="number" id="ads" placeholder="product ads">
                <input type="number" id="discount" placeholder="product discount">
                <small id="total"></small>
            </div>
             

            <input type="number" placeholder="product quantity" id="quantity">
            <input type="text" placeholder="product category" id="category">
            <button id="add">Add</button>
        </div>
        <div class="outputs">
            <div class="searchBlock">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
                <div class="btnSearch">
                    <button onclick="getSearchMode(this.id)" id="searchTitle">Search By Title</button>
                    <button onclick="getSearchMode(this.id)" id="searchCategory">Search By Category</button>
                </div>
            </div>
            <div id="deleteAll"></div>
            <table>
                <tr>
                    <th>id</th>
                    <th>title</th>
                    <th>price</th>
                    <th>fees</th>
                    <th>ads</th>
                    <th>discount</th>
                    <th>total</th>
                    <th>category</th>
                    <th>update</th>
                    <th>delete</th>
                </tr>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
    </div>
</body>
<script src="script.js"></script>
</html>
